name: Setup Python
description: "Setup Python with pip/poetry/uv caching and dependency installation"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.12"
  package-manager:
    description: "Package manager to use (pip, poetry, uv)"
    required: false
    default: "pip"
  working-directory:
    description: "Working directory for install command"
    required: false
    default: "."
  requirements-file:
    description: "Requirements file path (for pip)"
    required: false
    default: "requirements.txt"
  install:
    description: "Run dependency installation after setup"
    required: false
    default: "true"

outputs:
  python-version:
    description: "Installed Python version"
    value: ${{ steps.setup-python.outputs.python-version }}

runs:
  using: composite
  steps:
    - name: Setup Python
      id: setup-python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: ${{ inputs.package-manager == 'poetry' && 'poetry' || 'pip' }}

    - name: Install uv
      if: inputs.package-manager == 'uv'
      shell: bash
      run: pip install uv

    - name: Install Poetry
      if: inputs.package-manager == 'poetry'
      shell: bash
      run: pip install poetry

    - name: Install dependencies (pip)
      if: inputs.install == 'true' && inputs.package-manager == 'pip'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ inputs.requirements-file }}" ]; then
          pip install -r "${{ inputs.requirements-file }}"
        fi
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi

    - name: Install dependencies (poetry)
      if: inputs.install == 'true' && inputs.package-manager == 'poetry'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: poetry install --no-interaction

    - name: Install dependencies (uv)
      if: inputs.install == 'true' && inputs.package-manager == 'uv'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f pyproject.toml ]; then
          uv sync
        elif [ -f "${{ inputs.requirements-file }}" ]; then
          uv pip install -r "${{ inputs.requirements-file }}"
        fi
