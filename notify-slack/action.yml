name: Notify Slack
description: "Send a Slack notification for build/deploy status"

inputs:
  webhook-url:
    description: "Slack Incoming Webhook URL"
    required: true
  status:
    description: "Job status (success, failure, cancelled)"
    required: true
  title:
    description: "Notification title"
    required: false
    default: ""
  message:
    description: "Custom message body"
    required: false
    default: ""
  environment:
    description: "Deployment environment"
    required: false
    default: ""
  url:
    description: "Deployment or build URL"
    required: false
    default: ""
  mention-on-failure:
    description: "Slack user/group ID to mention on failure (e.g., @here, U12345)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Send Slack notification
      shell: bash
      run: |
        # Color based on status
        case "${{ inputs.status }}" in
          success)   COLOR="#36a64f"; EMOJI="✅"; STATUS_TEXT="Success" ;;
          failure)   COLOR="#dc3545"; EMOJI="❌"; STATUS_TEXT="Failed" ;;
          cancelled) COLOR="#ffc107"; EMOJI="⚠️"; STATUS_TEXT="Cancelled" ;;
          *)         COLOR="#6c757d"; EMOJI="ℹ️"; STATUS_TEXT="${{ inputs.status }}" ;;
        esac

        # Build title
        TITLE="${{ inputs.title }}"
        if [ -z "$TITLE" ]; then
          TITLE="${GITHUB_REPOSITORY} — ${GITHUB_WORKFLOW}"
        fi

        # Build message
        MSG="${{ inputs.message }}"
        if [ -z "$MSG" ]; then
          MSG="${EMOJI} *${STATUS_TEXT}*"
          MSG="$MSG\n*Repo:* <${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}|${GITHUB_REPOSITORY}>"
          MSG="$MSG\n*Branch:* \`${GITHUB_REF_NAME}\`"
          MSG="$MSG\n*Commit:* \`${GITHUB_SHA::8}\`"
          MSG="$MSG\n*Run:* <${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|#${GITHUB_RUN_NUMBER}>"

          if [ -n "${{ inputs.environment }}" ]; then
            MSG="$MSG\n*Environment:* ${{ inputs.environment }}"
          fi
          if [ -n "${{ inputs.url }}" ]; then
            MSG="$MSG\n*URL:* <${{ inputs.url }}>"
          fi
        fi

        # Mention on failure
        MENTION=""
        if [ "${{ inputs.status }}" = "failure" ] && [ -n "${{ inputs.mention-on-failure }}" ]; then
          MENTION="\n\ncc ${{ inputs.mention-on-failure }}"
        fi

        # Send to Slack
        PAYLOAD=$(cat <<EOF
        {
          "attachments": [
            {
              "color": "${COLOR}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${TITLE}*\n${MSG}${MENTION}"
                  }
                }
              ]
            }
          ]
        }
        EOF
        )

        curl -sf -X POST \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "${{ inputs.webhook-url }}"
